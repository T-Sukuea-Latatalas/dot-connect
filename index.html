<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <!-- ユーザーのズーム操作を禁止し、パターン入力中の誤作動を完全に防ぐ設定 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pattern Memory - Life Edition</title>
    
    <!-- 外部スタイルシートの読み込み -->
    <link rel="stylesheet" href="style.css">
    
    <!-- モダンなタイポグラフィのためのGoogle Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    
    <!-- スマホブラウザのアドレスバー等の色設定 -->
    <meta name="theme-color" content="#05070a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
</head>
<body>

    <div class="game-wrapper">
        <!-- ヘッダーエリア -->
        <header>
            <h1 class="game-title">PATTERN MEMORY</h1>
        </header>

        <!-- 統計エリア（LEVEL / SCORE） -->
        <section class="stats-container">
            <div class="stat-item">
                <span class="label">LEVEL</span>
                <span id="level-value" class="value">1</span>
            </div>
            <div class="stat-item">
                <span class="label">SCORE</span>
                <span id="score-value" class="value">0</span>
            </div>
        </section>

        <!-- インストラクション・フィードバックメッセージ -->
        <section class="message-area">
            <p id="status-message">「ゲーム開始」を押してください</p>
        </section>

        <!-- ライフ表示エリア（タイマーの代わりに新規追加） -->
        <section id="life-display" class="life-container">
            <!-- ここにJavaScriptから❤️が動的に生成されます -->
        </section>

        <!-- ゲームのメインとなるCanvasエリア -->
        <section class="canvas-container">
            <!-- CSSでレスポンシブ調整可能な描画領域 -->
            <canvas id="game-canvas" width="320" height="320"></canvas>
        </section>

        <!-- 操作ボタンエリア -->
        <section class="controls">
            <button id="start-btn" class="primary-btn">ゲーム開始</button>
        </section>
    </div>

    <!-- 外部JavaScriptの読み込み -->
    <script src="script.js"></script>
</body>
</html>
